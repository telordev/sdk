  /v1/usage:
    get:
      tags:
      - Account
      summary: Get token usage for the current period.
      description: |-
        Scoped to the caller's account: a platform (API) key reports THAT platform
        account's API usage (`platformAccountId` non-empty); a consumer session JWT
        reports the consumer/subscription bucket (empty `platformAccountId`). Reads
        the step-1 payments shape: top-level `totalRequests`/`totalTokens` (uint64
        serialized as JSON strings) + per-model `models[]` (from which `by_model` is
        derived).
      operationId: getUsage
      responses:
        '200':
          description: Usage.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenUsage'
        '401':
          description: Missing/invalid credential.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
  /v1/usage/dashboard:
    get:
      tags:
      - Account
      summary: Rich per-model usage view (included-vs-extra split + compute window).
      description: |-
        This re-homes the data the deleted fabric `InferenceService.GetInferenceUsage`
        once carried, assembled from the surviving authorities:
          - `plan` + `planIncludedTokens` ← payments `GetBilling` (`plan`) + core
            `billing::plan_included_tokens_for`,
          - `periodStart` ← core `billing::current_billing_period_start_ms`,
          - `models[]` (per-tier included-vs-extra split + `extraSpendCents` +
            `requestCount`) ← payments `GetTokenUsage`; `multiplier` ← core
            `billing::model_multiplier`,
          - `billing` block (extra-usage toggle/cap + credit balance + period spend)
            ← payments `GetBillingPreferences`,
          - `compute.session.current` (the 5h compute-session window) ← tally
            `GetSession`, with the `state`/`usedMs`/`limitMs` derived from the row's
            timers (the same derivation tally's `report_activity` UPSERT implies).

        Individual-user scope (`authenticate_v1_user`): a logged-in consumer session,
        no platform-account requirement. The caller's `x-user-id` (verified JWT sub)
        is forced onto every downstream — never a client header. Each sub-section
        degrades independently: a payments / tally outage leaves that block at its
        zero-value default rather than failing the whole panel, so the dashboard
        always renders.

        **Omitted vs the old fabric shape:** `compute.session.current.inFlight` is
        always `0` — the in-flight chat count lived in fabric's in-process
        `InferenceService` state, which no longer exists; tally's durable session row
        carries only the window timers. The panel reads `inFlight` solely for a
        cosmetic "Mid-turn" badge, so `0` degrades it to "Active" without breaking.
      operationId: getUsageDashboard
      responses:
        '200':
          description: Usage dashboard.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageDashboard'
        '401':
          description: Missing/invalid credential.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
