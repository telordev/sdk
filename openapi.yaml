components:
  schemas:
    Account:
      type: object
      description: '`GET /v1/account`.'
      required:
      - id
      - user_id
      - plan
      properties:
        id:
          type: string
          example: pa_123
        plan:
          type: string
        user_id:
          type: string
    AddMemoryRequest:
      type: object
      description: '`POST /v1/memories` request body.'
      required:
      - text
      properties:
        metadata:
          type:
          - object
          - 'null'
          description: Opaque string key/value metadata stored with the memory.
        text:
          type: string
    Agent:
      type: object
      description: One subagent run record.
      required:
      - id
      - description
      - status
      - started_at
      - completed_at
      - duration_ms
      - turns
      - input_tokens
      - output_tokens
      properties:
        completed_at:
          type: object
        description:
          type: string
        duration_ms:
          type: integer
          format: int64
        error:
          type:
          - string
          - 'null'
        id:
          type: string
        input_tokens:
          type: integer
          format: int64
        output_tokens:
          type: integer
          format: int64
        started_at:
          type: object
        status:
          type: string
        turns:
          type: integer
          format: int64
    AgentList:
      type: object
      description: '`GET /v1/agents` → subagent run history.'
      required:
      - agents
      properties:
        agents:
          type: array
          items:
            $ref: '#/components/schemas/Agent'
    AnthropicError:
      type: object
      description: The Anthropic error envelope (Messages / Models surfaces).
      required:
      - type
      - error
      properties:
        error:
          $ref: '#/components/schemas/AnthropicErrorBody'
        request_id:
          type:
          - string
          - 'null'
        type:
          type: string
          description: Always `"error"`.
    AnthropicErrorBody:
      type: object
      description: The `error` member of an [`AnthropicError`].
      required:
      - type
      - message
      properties:
        message:
          type: string
        type:
          type: string
          description: |-
            `invalid_request_error` | `authentication_error` | `permission_error` |
            `not_found_error` | `request_too_large` | `rate_limit_error` |
            `api_error` | `overloaded_error`.
    Billing:
      type: object
      description: '`GET /v1/billing`.'
      required:
      - plan
      - status
      - limits
      - current_usage
      properties:
        current_usage:
          type: object
        limits:
          type: object
        plan:
          type: string
        status:
          type: string
    CountTokensRequest:
      type: object
      description: |-
        `POST /v1/messages/count_tokens` request body (same as messages minus
        `max_tokens` / `stream`).
      required:
      - model
      - messages
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/InputMessage'
        model:
          type: string
        system:
          type:
          - object
          - 'null'
        tools:
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/Tool'
    CountTokensResponse:
      type: object
      description: '`POST /v1/messages/count_tokens` response.'
      required:
      - input_tokens
      properties:
        input_tokens:
          type: integer
          format: int64
    CreateMessageRequest:
      type: object
      description: '`POST /v1/messages` request body.'
      required:
      - model
      - messages
      - max_tokens
      properties:
        max_tokens:
          type: integer
          format: int64
          description: Max tokens to generate (> 0).
          example: 1024
          minimum: 1
        messages:
          type: array
          items:
            $ref: '#/components/schemas/InputMessage'
          description: Non-empty conversation turns.
        metadata:
          type:
          - object
          - 'null'
          description: Opaque metadata (e.g. `{user_id}`); accepted and ignored.
        model:
          type: string
          description: '`"rye"` or `"zoysia"`.'
          example: zoysia
        stop_sequences:
          type:
          - array
          - 'null'
          items:
            type: string
        stream:
          type:
          - boolean
          - 'null'
          description: Stream the response as named SSE events. Default `false`.
        system:
          type:
          - object
          - 'null'
          description: System prompt (string or `TextBlock[]`).
        temperature:
          type:
          - number
          - 'null'
          format: double
          maximum: 1
          minimum: 0
        tool_choice:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/ToolChoice'
        tools:
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/Tool'
        top_k:
          type:
          - integer
          - 'null'
          format: int64
        top_p:
          type:
          - number
          - 'null'
          format: double
          maximum: 1
          minimum: 0
    CreateProjectRequest:
      type: object
      description: '`POST /v1/sessions/{id}/projects` request body.'
      required:
      - name
      properties:
        description:
          type:
          - string
          - 'null'
        name:
          type: string
    CreateScheduleRequest:
      type: object
      description: '`POST /v1/schedules` request body.'
      required:
      - name
      - cron_expr
      - action_kind
      properties:
        action_kind:
          type: string
        action_payload:
          type:
          - object
          - 'null'
        cron_expr:
          type: string
        name:
          type: string
    CreateTaskRequest:
      type: object
      description: '`POST /v1/sessions/{id}/tasks` request body.'
      required:
      - title
      properties:
        description:
          type:
          - string
          - 'null'
        labels:
          type:
          - array
          - 'null'
          items:
            type: string
        parent_task_id:
          type:
          - string
          - 'null'
        priority:
          type:
          - string
          - 'null'
        project_id:
          type:
          - string
          - 'null'
        status:
          type:
          - string
          - 'null'
        title:
          type: string
    CreateWorkflowRequest:
      type: object
      description: '`POST /v1/workflows` request body.'
      required:
      - name
      - source
      properties:
        name:
          type: string
        source:
          type: string
    FlagsResponse:
      type: object
      description: '`GET /v1/flags` → `{flags: {flag: bool}}`.'
      required:
      - flags
      properties:
        flags:
          type: object
          description: '`{flag: enabled}`.'
    FreeformObject:
      type: object
      description: |-
        A free-form JSON object (renders as `type: object` with no fixed schema).
        Used for bodies the hand-authored contract leaves untyped (PM internals,
        nested billing/usage detail, workflow run output).
    ImageBlock:
      type: object
      description: '`{"type":"image","source":{...}}`'
      required:
      - source
      properties:
        source:
          $ref: '#/components/schemas/ImageSource'
    ImageSource:
      type: object
      description: A base64 image source.
      required:
      - type
      - media_type
      - data
      properties:
        data:
          type: string
          description: Base64-encoded image bytes.
        media_type:
          type: string
          description: e.g. `"image/png"`.
        type:
          type: string
          description: Always `"base64"`.
          example: base64
    InputContentBlock:
      oneOf:
      - allOf:
        - $ref: '#/components/schemas/TextBlock'
        - type: object
          required:
          - type
          properties:
            type:
              type: string
              enum:
              - text
      - allOf:
        - $ref: '#/components/schemas/ImageBlock'
        - type: object
          required:
          - type
          properties:
            type:
              type: string
              enum:
              - image
      - allOf:
        - $ref: '#/components/schemas/ToolUseBlock'
        - type: object
          required:
          - type
          properties:
            type:
              type: string
              enum:
              - tool_use
      - allOf:
        - $ref: '#/components/schemas/ToolResultBlock'
        - type: object
          required:
          - type
          properties:
            type:
              type: string
              enum:
              - tool_result
      - allOf:
        - $ref: '#/components/schemas/ThinkingBlock'
        - type: object
          required:
          - type
          properties:
            type:
              type: string
              enum:
              - thinking
      description: An input content block (discriminated on `type`).
    InputMessage:
      type: object
      description: One input conversation turn.
      required:
      - role
      - content
      properties:
        content:
          type: object
          description: A string OR an array of [`InputContentBlock`].
        role:
          type: string
          description: '`"user"` or `"assistant"`.'
    LegacyError:
      type: object
      description: The legacy error envelope (platform / dashboard surfaces).
      required:
      - error
      properties:
        error:
          $ref: '#/components/schemas/LegacyErrorBody'
    LegacyErrorBody:
      type: object
      description: The `error` member of a [`LegacyError`].
      required:
      - code
      - message
      properties:
        code:
          type: string
        message:
          type: string
    Memory:
      type: object
      description: A memory entry.
      required:
      - id
      - text
      - metadata
      - created_at
      properties:
        created_at:
          type: string
        id:
          type: string
        metadata:
          type: object
          description: Opaque string key/value metadata.
        score:
          type:
          - number
          - 'null'
          format: double
        text:
          type: string
    MemoryList:
      type: object
      description: '`GET /v1/memories`.'
      required:
      - memories
      properties:
        memories:
          type: array
          items:
            $ref: '#/components/schemas/Memory'
    MemoryStats:
      type: object
      description: '`GET /v1/memories/stats`.'
      required:
      - count
      - last_added_at
      properties:
        count:
          type: integer
          format: int64
        last_added_at:
          type: string
    Message:
      type: object
      description: The Anthropic `Message` object (buffered, non-stream response).
      required:
      - id
      - type
      - role
      - model
      - content
      - usage
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/OutputContentBlock'
        id:
          type: string
          example: msg_013Zva2CMHLNnXjNJJKqJ2EF
        model:
          type: string
        role:
          type: string
          description: Always `"assistant"`.
        stop_reason:
          type:
          - string
          - 'null'
          description: '`end_turn` | `max_tokens` | `stop_sequence` | `tool_use` | null.'
        stop_sequence:
          type:
          - string
          - 'null'
        type:
          type: string
          description: Always `"message"`.
        usage:
          $ref: '#/components/schemas/Usage'
    Model:
      type: object
      description: An Anthropic-shaped `Model` object.
      required:
      - id
      - type
      - display_name
      - created_at
      properties:
        created_at:
          type: string
        display_name:
          type: string
        id:
          type: string
        max_input_tokens:
          type:
          - integer
          - 'null'
          format: int64
        max_tokens:
          type:
          - integer
          - 'null'
          format: int64
        type:
          type: string
          description: Always `"model"`.
    ModelList:
      type: object
      description: |-
        `GET /v1/models` page. Carries the Anthropic `data`/cursor shape plus the
        legacy console fields (`models` / `acp_providers`).
      required:
      - data
      - has_more
      - models
      - acp_providers
      properties:
        acp_providers:
          type: array
          items:
            type: object
          description: Legacy console ACP provider rows (additive).
        data:
          type: array
          items:
            $ref: '#/components/schemas/Model'
        first_id:
          type:
          - string
          - 'null'
        has_more:
          type: boolean
        last_id:
          type:
          - string
          - 'null'
        models:
          type: array
          items:
            type: object
          description: Legacy console model rows (additive).
    OutputContentBlock:
      oneOf:
      - allOf:
        - $ref: '#/components/schemas/TextBlock'
        - type: object
          required:
          - type
          properties:
            type:
              type: string
              enum:
              - text
      - allOf:
        - $ref: '#/components/schemas/ToolUseBlock'
        - type: object
          required:
          - type
          properties:
            type:
              type: string
              enum:
              - tool_use
      description: An output content block on a `Message` (text or tool_use).
    Plugin:
      type: object
      description: A plugin entry.
      required:
      - name
      - kind
      - status
      properties:
        config_keys:
          type:
          - array
          - 'null'
          items:
            type: string
        configurable:
          type:
          - boolean
          - 'null'
        error:
          type:
          - string
          - 'null'
        kind:
          type: string
        name:
          type: string
        status:
          type: string
    Project:
      type: object
      description: A PM project.
      required:
      - project_id
      - name
      - archived
      - created_at
      - updated_at
      properties:
        archived:
          type: boolean
        created_at:
          type: string
        description:
          type:
          - string
          - 'null'
        name:
          type: string
        project_id:
          type: string
        updated_at:
          type: string
    Schedule:
      type: object
      description: A cron schedule.
      required:
      - task_id
      - name
      - cron_expr
      - action_kind
      - action_payload
      - enabled
      - created_at
      - updated_at
      properties:
        action_kind:
          type: string
        action_payload:
          type: object
        created_at:
          type: string
        cron_expr:
          type: string
        enabled:
          type: boolean
        last_run_at:
          type:
          - string
          - 'null'
        name:
          type: string
        next_run_at:
          type:
          - string
          - 'null'
        task_id:
          type: string
        updated_at:
          type: string
    Session:
      type: object
      description: An agentic session object.
      required:
      - id
      - status
      - created_at
      properties:
        created_at:
          type: string
        id:
          type: string
        message_count:
          type:
          - integer
          - 'null'
          format: int64
        model:
          type:
          - string
          - 'null'
        status:
          type: string
        title:
          type:
          - string
          - 'null'
        updated_at:
          type:
          - string
          - 'null'
    SessionPromptRequest:
      type: object
      description: '`POST /v1/sessions/{id}/messages` request body.'
      required:
      - content
      properties:
        content:
          type: string
        stream:
          type:
          - boolean
          - 'null'
    SessionPromptResponse:
      type: object
      description: '`POST /v1/sessions/{id}/messages` buffered response.'
      required:
      - message
      - usage
      properties:
        message:
          type: object
        usage:
          $ref: '#/components/schemas/SessionUsage'
    SessionUsage:
      type: object
      description: Anthropic-style session token usage (no `total_tokens`).
      required:
      - input_tokens
      - output_tokens
      properties:
        input_tokens:
          type: integer
          format: int64
        output_tokens:
          type: integer
          format: int64
    Task:
      type: object
      description: A kanban task card.
      required:
      - task_id
      - title
      - status
      - labels
      - checklist
      - sort_order
      - created_at
      - updated_at
      properties:
        checklist:
          type: object
          description: Decoded checklist array.
        created_at:
          type: string
        description:
          type:
          - string
          - 'null'
        labels:
          type: object
          description: Decoded labels array.
        parent_task_id:
          type:
          - string
          - 'null'
        priority:
          type:
          - string
          - 'null'
        project_id:
          type:
          - string
          - 'null'
        sort_order:
          type: number
          format: double
        status:
          type: string
        task_id:
          type: string
        title:
          type: string
        updated_at:
          type: string
    TextBlock:
      type: object
      description: '`{"type":"text","text":"..."}`'
      required:
      - text
      properties:
        text:
          type: string
    ThinkingBlock:
      type: object
      description: '`{"type":"thinking","thinking":"..."}` — echoed as plain context.'
      required:
      - thinking
      properties:
        thinking:
          type: string
    TokenUsage:
      type: object
      description: '`GET /v1/usage`.'
      required:
      - period
      - requests
      - tokens
      - by_model
      properties:
        by_model:
          type: object
          description: '`{model: tokens}`.'
        period:
          type: string
        requests:
          type: integer
          format: int64
        tokens:
          type: integer
          format: int64
    Tool:
      type: object
      description: A tool definition.
      required:
      - name
      - input_schema
      properties:
        description:
          type:
          - string
          - 'null'
        input_schema:
          type: object
          description: JSON Schema for the tool input.
        name:
          type: string
    ToolChoice:
      type: object
      description: The `tool_choice` directive.
      required:
      - type
      properties:
        name:
          type:
          - string
          - 'null'
        type:
          type: string
          description: '`auto` | `any` | `tool` | `none`.'
    ToolResultBlock:
      type: object
      description: '`{"type":"tool_result","tool_use_id":"toolu_...","content":...,"is_error"?}`'
      required:
      - tool_use_id
      properties:
        content:
          type:
          - object
          - 'null'
          description: A string OR a `TextBlock[]`.
        is_error:
          type:
          - boolean
          - 'null'
        tool_use_id:
          type: string
    ToolUseBlock:
      type: object
      description: '`{"type":"tool_use","id":"toolu_...","name":"...","input":{...}}`'
      required:
      - id
      - name
      - input
      properties:
        id:
          type: string
        input:
          type: object
        name:
          type: string
    Usage:
      type: object
      description: Token usage on a `Message`.
      required:
      - input_tokens
      - output_tokens
      properties:
        input_tokens:
          type: integer
          format: int64
        output_tokens:
          type: integer
          format: int64
    UsageDashboard:
      type: object
      description: '`GET /v1/usage/dashboard`.'
      required:
      - plan
      - period_start
      - models
      - billing
      properties:
        billing:
          type: object
          description: Extra-usage toggle/cap + credit balance + period spend.
        compute:
          type:
          - object
          - 'null'
          description: The 5h compute-session window block (or `null`).
        models:
          type: array
          items:
            $ref: '#/components/schemas/UsageDashboardModel'
        period_start:
          type: integer
          format: int64
        plan:
          type: string
    UsageDashboardModel:
      type: object
      description: One per-model row of the usage dashboard.
      required:
      - model
      - included_input_tokens
      - included_output_tokens
      - extra_input_tokens
      - extra_output_tokens
      - extra_spend_cents
      - request_count
      - multiplier
      properties:
        extra_input_tokens:
          type: integer
          format: int64
        extra_output_tokens:
          type: integer
          format: int64
        extra_spend_cents:
          type: integer
          format: int64
        included_input_tokens:
          type: integer
          format: int64
        included_output_tokens:
          type: integer
          format: int64
        model:
          type: string
        multiplier:
          type: number
          format: double
        request_count:
          type: integer
          format: int64
    Workflow:
      type: object
      description: A workflow definition (with source).
      required:
      - workflow_id
      - name
      - compile_status
      - enabled
      - created_at
      - updated_at
      properties:
        compile_status:
          type: string
        created_at:
          type: string
        enabled:
          type: boolean
        name:
          type: string
        source:
          type:
          - string
          - 'null'
        updated_at:
          type: string
        workflow_id:
          type: string
tags:
- name: Messages
  description: Anthropic-wire-compatible Messages API (flagship).
- name: Models
  description: Anthropic-shaped model catalog.
- name: Account
  description: Account / usage / billing (read) + agents.
- name: Sessions
  description: Agentic, model-driven session lifecycle + prompt loop.
- name: Memories
  description: User-scoped long-term memory store.
- name: Plugins
  description: Plugins / tools / marketplace.
- name: ProjectManagement
  description: Session-scoped kanban + user-scoped schedules / workflows.
- name: Library
  description: User research/knowledge library + binary artifacts.
- name: Flags
  description: Feature-flag discovery.
- name: Meta
  description: API metadata (the OpenAPI document itself).
