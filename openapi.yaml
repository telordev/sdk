openapi: 3.1.0
info:
  title: Simse API
  version: "2026-06-01"
  description: |
    The Simse public REST API at `api.simse.dev`. The flagship endpoint
    `POST /v1/messages` is **wire-compatible with the Anthropic Messages API** —
    the official Anthropic client patterns work against it. Models: `rye`
    (Qwen3.5-4B) and `zoysia` (Qwen3.5-9B, default).

    Authoritative contract: `sdk/CONTRACT.md`. Gateway: `simse-warp`.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: https://api.simse.dev
security:
  - ApiKeyHeader: []
  - BearerAuth: []
tags:
  - name: Messages
    description: Anthropic-wire-compatible inference (flagship).
  - name: Models
    description: Hosted model catalog.
  - name: Account
    description: Account, usage, billing, and subagent history.
  - name: Sessions
    description: Persistent agentic sessions (prompt loop + history).
  - name: Connectors
    description: Remote-MCP connector registry (session tool surface).
  - name: Memories
    description: Adaptive long-term memory (quill).
  - name: Plugins
    description: Plugin / marketplace registry (quiver).
  - name: ProjectManagement
    description: Kanban tasks, projects, todos, schedules, and workflows (slate).
  - name: Flags
    description: Feature-flag discovery.

paths:
  # ── Messages ──────────────────────────────────────────────────────────────────

  /v1/messages:
    post:
      tags: [Messages]
      operationId: createMessage
      summary: Create a Message (Anthropic-wire-compatible).
      description: |
        When `stream` is false the response is a `Message` object.
        When `stream` is true the response is a `text/event-stream` of named SSE
        events (`message_start` → `content_block_start` → `content_block_delta` →
        `content_block_stop` → `message_delta` → `message_stop`, plus `ping`).
        Errors mid-stream are emitted as `event: error\ndata: {...}\n\n`.
      parameters:
        - $ref: "#/components/parameters/AnthropicVersion"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateMessageRequest" }
            examples:
              basic:
                summary: Simple user message
                value:
                  model: zoysia
                  max_tokens: 1024
                  messages:
                    - role: user
                      content: What is the capital of France?
              streaming:
                summary: Streamed response
                value:
                  model: zoysia
                  max_tokens: 512
                  stream: true
                  messages:
                    - role: user
                      content: Tell me a short joke.
      responses:
        "200":
          description: |
            A `Message` object (when `stream` is false), or a `text/event-stream`
            of named SSE events (when `stream` is true).
          headers:
            request-id: { $ref: "#/components/headers/RequestId" }
            anthropic-ratelimit-requests-limit: { $ref: "#/components/headers/RateLimitLimit" }
            anthropic-ratelimit-requests-remaining: { $ref: "#/components/headers/RateLimitRemaining" }
            anthropic-ratelimit-requests-reset: { $ref: "#/components/headers/RateLimitReset" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Message" }
            text/event-stream:
              schema:
                type: string
                description: |
                  SSE stream of `MessageStreamEvent` named events. Each event is
                  `event: <type>\ndata: <json>\n\n`. Sequence:
                  `message_start` → `content_block_start` → `ping` →
                  `content_block_delta` (×N) → `content_block_stop` →
                  `message_delta` → `message_stop`. Error events: `event: error`.
        "400": { $ref: "#/components/responses/AnthropicError" }
        "401": { $ref: "#/components/responses/AnthropicError" }
        "429": { $ref: "#/components/responses/AnthropicError" }
        "503": { $ref: "#/components/responses/AnthropicError" }

  /v1/messages/count_tokens:
    post:
      tags: [Messages]
      operationId: countTokens
      summary: Count input tokens for a Messages request (estimate).
      parameters:
        - $ref: "#/components/parameters/AnthropicVersion"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CountTokensRequest" }
      responses:
        "200":
          description: Token count estimate.
          content:
            application/json:
              schema:
                type: object
                required: [input_tokens]
                properties:
                  input_tokens: { type: integer, description: Estimated input token count. }
        "400": { $ref: "#/components/responses/AnthropicError" }
        "401": { $ref: "#/components/responses/AnthropicError" }

  # ── Models ────────────────────────────────────────────────────────────────────

  /v1/models:
    get:
      tags: [Models]
      operationId: listModels
      summary: List available models.
      parameters:
        - { name: limit, in: query, schema: { type: integer, default: 20 } }
        - { name: before_id, in: query, schema: { type: string } }
        - { name: after_id, in: query, schema: { type: string } }
      responses:
        "200":
          description: A page of models.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModelList" }
        "401": { $ref: "#/components/responses/AnthropicError" }

  /v1/models/{model_id}:
    get:
      tags: [Models]
      operationId: getModel
      summary: Retrieve a single model.
      parameters:
        - { name: model_id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: A model object.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Model" }
        "404": { $ref: "#/components/responses/AnthropicError" }

  # ── Account ───────────────────────────────────────────────────────────────────

  /v1/account:
    get:
      tags: [Account]
      operationId: getAccount
      summary: Get the authenticated platform account.
      responses:
        "200":
          description: Account object.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Account" }
        "401": { $ref: "#/components/responses/LegacyError" }

  /v1/usage:
    get:
      tags: [Account]
      operationId: getUsage
      summary: Get token usage summary for the current billing period.
      responses:
        "200":
          description: Usage summary.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UsageSummary" }
        "401": { $ref: "#/components/responses/LegacyError" }

  /v1/usage/dashboard:
    get:
      tags: [Account]
      operationId: getUsageDashboard
      summary: Rich per-model usage view (included-vs-extra split + compute window).
      responses:
        "200":
          description: Usage dashboard.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UsageDashboard" }
        "401": { $ref: "#/components/responses/LegacyError" }

  /v1/agents:
    get:
      tags: [Account]
      operationId: listAgents
      summary: Subagent run history (newest first).
      responses:
        "200":
          description: Agents list.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentList" }
        "401": { $ref: "#/components/responses/LegacyError" }

  /v1/billing:
    get:
      tags: [Account]
      operationId: getBilling
      summary: Get plan + limits.
      responses:
        "200":
          description: Billing summary.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BillingSummary" }
        "401": { $ref: "#/components/responses/LegacyError" }

  # ── Sessions ──────────────────────────────────────────────────────────────────

  /v1/sessions:
    post:
      tags: [Sessions]
      operationId: createSession
      summary: Create an agentic session.
      description: |
        Creates a new persistent session. If `connectors` are supplied, each is
        validated via a live `tools/list` probe against the MCP server — the
        session is rolled back and an error returned if any connector fails
        validation (spec §1.4). Returns **201 Created**.
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateSessionParams" }
            examples:
              minimal:
                summary: Minimal session (no system prompt)
                value:
                  title: My coding session
              with_connector:
                summary: Session with attached MCP connector
                value:
                  title: Agent with tools
                  system: You are a helpful assistant. Never move money without approval.
                  metadata:
                    team: eng
                    role: runner
                  connectors:
                    - connector_id: conn_abc123
                      bearer: team-bearer-token
      responses:
        "201":
          description: Session created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionCreated" }
        "400": { $ref: "#/components/responses/LegacyError" }
        "401": { $ref: "#/components/responses/LegacyError" }
        "404":
          description: A referenced connector was not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LegacyError" }
        "502":
          description: A connector MCP server was unreachable during validation.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LegacyError" }
    get:
      tags: [Sessions]
      operationId: listSessions
      summary: List sessions (newest first).
      responses:
        "200":
          description: Sessions list.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionList" }
        "401": { $ref: "#/components/responses/LegacyError" }

  /v1/sessions/{id}:
    get:
      tags: [Sessions]
      operationId: getSession
      summary: Get a single session by ID.
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          description: Session object.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Session" }
        "401": { $ref: "#/components/responses/LegacyError" }
        "404": { $ref: "#/components/responses/LegacyError" }
    delete:
      tags: [Sessions]
      operationId: deleteSession
      summary: Delete a session and its history.
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          description: Session deleted.
          content:
            application/json:
              schema:
                type: object
                required: [deleted, id]
                properties:
                  deleted: { type: boolean, const: true }
                  id: { type: string }
        "401": { $ref: "#/components/responses/LegacyError" }
        "404": { $ref: "#/components/responses/LegacyError" }

  /v1/sessions/{id}/messages:
    post:
      tags: [Sessions]
      operationId: promptSession
      summary: Send a prompt to a session (buffered or streamed).
      description: |
        Forwards the user content to the model orchestrator. Persists the user
        turn before calling the model so history is consistent on resume.

        When `stream` is false (default): blocks until the model completes and
        returns `{message, usage}`.

        When `stream` is true: returns `text/event-stream`. Each frame is
        `data: <json>\n\n` where `<json>` is a `SessionStreamEvent`. The stream
        terminates with `data: [DONE]\n\n` after the `done` or `error` event.

        SSE event types:
        - `delta` — incremental text token.
        - `tool_call` — the model invoked a tool.
        - `tool_result` — the tool result was returned to the model.
        - `done` — the turn is complete (carries final text + token counts).
        - `error` — the model or backend returned an error; stream closes after.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  description: The user message text (max 100 KiB).
                  maxLength: 102400
                stream:
                  type: boolean
                  default: false
                  description: When true, respond with SSE instead of buffering.
      responses:
        "200":
          description: |
            Buffered turn (`stream:false`), or an SSE stream of `SessionStreamEvent`
            objects (`stream:true`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionPromptResponse" }
            text/event-stream:
              schema:
                type: object
                description: |
                  `data: <SessionStreamEvent JSON>\n\n` frames, terminated by
                  `data: [DONE]\n\n`. The `done` and `error` events are each
                  followed immediately by the `[DONE]` sentinel.
                oneOf:
                  - $ref: "#/components/schemas/SessionStreamEvent"
                  - type: string
                    const: "[DONE]"
                    description: Terminal sentinel frame.
        "400": { $ref: "#/components/responses/LegacyError" }
        "401": { $ref: "#/components/responses/LegacyError" }
        "404": { $ref: "#/components/responses/LegacyError" }
        "503": { $ref: "#/components/responses/LegacyError" }

  /v1/sessions/{id}/resume:
    post:
      tags: [Sessions]
      operationId: resumeSession
      summary: Rehydrate session history for client-side resume.
      description: |
        Read-only: reconstructs the conversation from the durable chat-store —
        the message history plus tool-call records. The client interleaves both
        arrays by `created_at` to re-render the full turn sequence.

        This is NOT a prompt endpoint — it does not send any message to the model.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Session history.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionResumeResponse" }
        "401": { $ref: "#/components/responses/LegacyError" }
        "404": { $ref: "#/components/responses/LegacyError" }

  /v1/sessions/{id}/abort:
    post:
      tags: [Sessions]
      operationId: abortSession
      summary: Cancel an in-flight prompt for this session.
      description: |
        Sends an abort signal to the loom orchestrator
        (`SessionService.Abort`). If no prompt is in flight the RPC succeeds
        silently. Returns `{aborted:true}` on success.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Abort acknowledged.
          content:
            application/json:
              schema:
                type: object
                required: [aborted, id]
                properties:
                  aborted: { type: boolean, const: true }
                  id: { type: string }
        "401": { $ref: "#/components/responses/LegacyError" }
        "404": { $ref: "#/components/responses/LegacyError" }
        "503": { $ref: "#/components/responses/LegacyError" }

  # ── Connectors ────────────────────────────────────────────────────────────────

  /v1/connectors:
    post:
      tags: [Connectors]
      operationId: createConnector
      summary: Register a remote-MCP connector.
      description: |
        Persists the connector definition in the chat-store. The bearer token
        and static header values are stored server-side and **never returned**
        in any response (spec §1.3). Returns **201 Created**.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ConnectorCreateParams" }
            examples:
              bearer_auth:
                summary: Bearer-authenticated MCP server
                value:
                  name: My MCP Server
                  type: mcp
                  url: https://mcp.example.com/mcp
                  auth:
                    kind: bearer
                    value: tok_supersecret
                  tool_allowlist: [search, read_file]
      responses:
        "201":
          description: Connector created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Connector" }
        "400": { $ref: "#/components/responses/LegacyError" }
        "401": { $ref: "#/components/responses/LegacyError" }
    get:
      tags: [Connectors]
      operationId: listConnectors
      summary: List connectors for the authenticated user (secrets redacted).
      responses:
        "200":
          description: Connector list.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConnectorList" }
        "401": { $ref: "#/components/responses/LegacyError" }

  /v1/connectors/{id}:
    get:
      tags: [Connectors]
      operationId: getConnector
      summary: Get one connector (secrets redacted).
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          description: Connector object.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Connector" }
        "401": { $ref: "#/components/responses/LegacyError" }
        "404": { $ref: "#/components/responses/LegacyError" }
    patch:
      tags: [Connectors]
      operationId: updateConnector
      summary: Partially update a connector.
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ConnectorUpdateParams" }
      responses:
        "200":
          description: Updated connector.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Connector" }
        "400": { $ref: "#/components/responses/LegacyError" }
        "401": { $ref: "#/components/responses/LegacyError" }
        "404": { $ref: "#/components/responses/LegacyError" }
    delete:
      tags: [Connectors]
      operationId: deleteConnector
      summary: Delete a connector.
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          description: Connector deleted.
          content:
            application/json:
              schema:
                type: object
                required: [deleted, id]
                properties:
                  deleted: { type: boolean, const: true }
                  id: { type: string }
        "401": { $ref: "#/components/responses/LegacyError" }
        "404": { $ref: "#/components/responses/LegacyError" }

  /v1/connectors/{id}/test:
    post:
      tags: [Connectors]
      operationId: testConnector
      summary: Probe the MCP server with a live tools/list call.
      description: |
        Performs a live `tools/list` JSON-RPC call against the connector's MCP
        endpoint. A bearer or header override in the request body takes
        precedence over the stored credentials. A failed probe (`ok: false`) is
        still a **200 response** — the failure is reported in-band, not as an
        HTTP error.
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                bearer:
                  type: string
                  description: >
                    Override the connector's stored bearer for this test call only.
                    An empty string is treated as absent.
                headers:
                  type: object
                  additionalProperties: { type: string }
                  description: >
                    Merge these headers on top of the connector's stored static
                    headers for this test call only.
      responses:
        "200":
          description: |
            Test result. A failed probe (`ok: false`) is still a 200 response —
            the failure is reported in-band.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConnectorTestResult" }
        "401": { $ref: "#/components/responses/LegacyError" }
        "404": { $ref: "#/components/responses/LegacyError" }

  # ── Memories ──────────────────────────────────────────────────────────────────

  /v1/memories:
    get:
      tags: [Memories]
      operationId: listMemories
      summary: List (or search) adaptive memories for the caller.
      description: |
        Without `query`: returns memories in recency order (`memory_list`).
        With `query`: performs semantic search (`memory_search`). User scope is
        forced to the authenticated caller's `user_id` server-side.
      parameters:
        - { name: query, in: query, schema: { type: string }, description: Semantic search query. }
        - { name: limit, in: query, schema: { type: integer }, description: Max results. }
      responses:
        "200":
          description: Memory list.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MemoryList" }
        "401": { $ref: "#/components/responses/LegacyError" }
        "503": { $ref: "#/components/responses/LegacyError" }
    post:
      tags: [Memories]
      operationId: addMemory
      summary: Add a new memory entry.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                  description: The text content to remember.
                metadata:
                  type: object
                  additionalProperties: { type: string }
                  description: Optional key-value metadata.
      responses:
        "201":
          description: Memory created. Returns the new memory ID.
          content:
            application/json:
              schema:
                type: object
                required: [id]
                properties:
                  id: { type: string, description: The ID of the new memory entry. }
        "400": { $ref: "#/components/responses/LegacyError" }
        "401": { $ref: "#/components/responses/LegacyError" }
        "503": { $ref: "#/components/responses/LegacyError" }

  /v1/memories/stats:
    get:
      tags: [Memories]
      operationId: memoryStats
      summary: Memory store statistics for the caller.
      responses:
        "200":
          description: Stats.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MemoryStats" }
        "401": { $ref: "#/components/responses/LegacyError" }
        "503": { $ref: "#/components/responses/LegacyError" }

  /v1/memories/{id}:
    delete:
      tags: [Memories]
      operationId: deleteMemory
      summary: Delete a memory entry.
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          description: Memory deleted.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
        "400": { $ref: "#/components/responses/LegacyError" }
        "401": { $ref: "#/components/responses/LegacyError" }
        "503": { $ref: "#/components/responses/LegacyError" }

  # ── Plugins ───────────────────────────────────────────────────────────────────

  /v1/plugins:
    get:
      tags: [Plugins]
      operationId: listPlugins
      summary: Built-in tool defs + the caller's installed plugin list with status.
      responses:
        "200":
          description: Plugin list.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PluginSurface" }
        "401": { $ref: "#/components/responses/LegacyError" }
        "503": { $ref: "#/components/responses/LegacyError" }

  /v1/plugins/registry:
    get:
      tags: [Plugins]
      operationId: listRegistry
      summary: The bundled plugin registry catalog (marketplace).
      responses:
        "200":
          description: Registry catalog.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RegistryCatalog" }
        "401": { $ref: "#/components/responses/LegacyError" }
        "503": { $ref: "#/components/responses/LegacyError" }

  /v1/plugins/registry/{id}:
    get:
      tags: [Plugins]
      operationId: registryDetail
      summary: Manifest + readme for one registry plugin.
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          description: Registry entry detail.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RegistryDetail" }
        "400": { $ref: "#/components/responses/LegacyError" }
        "401": { $ref: "#/components/responses/LegacyError" }
        "503": { $ref: "#/components/responses/LegacyError" }

  /v1/plugins/installed:
    get:
      tags: [Plugins]
      operationId: listInstalled
      summary: Installed plugins for the authenticated caller.
      responses:
        "200":
          description: Installed plugins.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstalledPluginList" }
        "401": { $ref: "#/components/responses/LegacyError" }
        "503": { $ref: "#/components/responses/LegacyError" }

  /v1/plugins/install:
    post:
      tags: [Plugins]
      operationId: installPlugin
      summary: Install a plugin from the registry.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plugin_name]
              properties:
                plugin_name: { type: string, description: Registry plugin name. }
                permissions:
                  type: array
                  items: { type: string }
                  description: Permission grants to request.
                secrets:
                  type: object
                  additionalProperties: { type: string }
                  description: Secret values required by the plugin (write-only; never returned).
      responses:
        "200":
          description: Install result.
          content:
            application/json:
              schema:
                type: object
                required: [installed]
                properties:
                  installed: { type: boolean }
        "400": { $ref: "#/components/responses/LegacyError" }
        "401": { $ref: "#/components/responses/LegacyError" }
        "503": { $ref: "#/components/responses/LegacyError" }

  /v1/plugins/uninstall:
    post:
      tags: [Plugins]
      operationId: uninstallPlugin
      summary: Uninstall a plugin.
      requestBody:
        required: true
        content:
