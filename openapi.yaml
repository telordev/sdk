                    example:
                      v1.chat: true
                      v1.sessions: true
                      v1.connectors: true
        "401": { $ref: "#/components/responses/LegacyError" }

components:
  securitySchemes:
    ApiKeyHeader:
      type: apiKey
      in: header
      name: x-api-key
      description: Simse platform API key (`sk_…`).
    BearerAuth:
      type: http
      scheme: bearer
      description: "Simse platform API key as `Authorization: Bearer sk_…`."

  parameters:
    AnthropicVersion:
      name: anthropic-version
      in: header
      required: false
      description: API version date string. Defaults to the latest when absent.
      schema: { type: string, default: "2026-06-01" }

  headers:
    RequestId:
      description: Unique request id (`req_…`). Echo in bug reports.
      schema: { type: string }
    RateLimitLimit:
      description: Per-window request budget.
      schema: { type: integer }
    RateLimitRemaining:
      description: Requests remaining in the window.
      schema: { type: integer }
    RateLimitReset:
      description: RFC 3339 UTC time the window resets.
      schema: { type: string, format: date-time }

  responses:
    AnthropicError:
      description: Anthropic-shaped error (Messages/Models surfaces).
      headers:
        request-id: { $ref: "#/components/headers/RequestId" }
        retry-after:
          description: Seconds to wait before retrying (on 429).
          schema: { type: integer }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/AnthropicError" }
    LegacyError:
      description: Legacy-shaped error (platform surfaces).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/LegacyError" }

  schemas:
    # ── Messages API ──────────────────────────────────────────────────────────────

    CreateMessageRequest:
      type: object
      required: [model, messages, max_tokens]
      properties:
        model: { type: string, examples: ["zoysia"] }
        messages:
          type: array
          items: { $ref: "#/components/schemas/InputMessage" }
        max_tokens: { type: integer, minimum: 1 }
        system:
          oneOf:
            - { type: string }
            - { type: array, items: { $ref: "#/components/schemas/TextBlock" } }
        temperature: { type: number, minimum: 0, maximum: 1 }
        top_p: { type: number, minimum: 0, maximum: 1 }
        top_k: { type: integer }
        stop_sequences: { type: array, items: { type: string } }
        stream: { type: boolean, default: false }
        tools:
          type: array
          items: { $ref: "#/components/schemas/Tool" }
        tool_choice: { $ref: "#/components/schemas/ToolChoice" }
        metadata:
          type: object
          properties: { user_id: { type: string } }

    CountTokensRequest:
      type: object
      required: [model, messages]
      properties:
        model: { type: string }
        messages:
          type: array
          items: { $ref: "#/components/schemas/InputMessage" }
        system:
          oneOf:
            - { type: string }
            - { type: array, items: { $ref: "#/components/schemas/TextBlock" } }
        tools:
          type: array
          items: { $ref: "#/components/schemas/Tool" }

    InputMessage:
      type: object
      required: [role, content]
      properties:
        role: { type: string, enum: [user, assistant] }
        content:
          oneOf:
            - { type: string }
            - { type: array, items: { $ref: "#/components/schemas/InputContentBlock" } }

    InputContentBlock:
      oneOf:
        - { $ref: "#/components/schemas/TextBlock" }
        - { $ref: "#/components/schemas/ImageBlock" }
        - { $ref: "#/components/schemas/ToolUseBlock" }
        - { $ref: "#/components/schemas/ToolResultBlock" }
      discriminator: { propertyName: type }

    TextBlock:
      type: object
      required: [type, text]
      properties:
        type: { type: string, const: text }
        text: { type: string }

    ImageBlock:
      type: object
      required: [type, source]
      properties:
        type: { type: string, const: image }
        source:
          type: object
          required: [type, media_type, data]
          properties:
            type: { type: string, const: base64 }
            media_type: { type: string, enum: [image/jpeg, image/png, image/gif, image/webp] }
            data: { type: string }

    ToolUseBlock:
      type: object
      required: [type, id, name, input]
      properties:
        type: { type: string, const: tool_use }
        id: { type: string }
        name: { type: string }
        input: { type: object, additionalProperties: true }

    ToolResultBlock:
      type: object
      required: [type, tool_use_id]
      properties:
        type: { type: string, const: tool_result }
        tool_use_id: { type: string }
        content:
          oneOf:
            - { type: string }
            - { type: array, items: { $ref: "#/components/schemas/TextBlock" } }
        is_error: { type: boolean }

    Tool:
      type: object
      required: [name, input_schema]
      properties:
        name: { type: string }
        description: { type: string }
        input_schema: { type: object, additionalProperties: true }

    ToolChoice:
      type: object
      required: [type]
      properties:
        type: { type: string, enum: [auto, any, tool, none] }
        name: { type: string, description: Required when type is "tool". }

    Message:
      type: object
      required: [id, type, role, model, content, stop_reason, usage]
      properties:
        id: { type: string, examples: ["msg_013Zva2CMHLNnXjNJJKqJ2EF"] }
        type: { type: string, const: message }
        role: { type: string, const: assistant }
        model: { type: string }
        content:
          type: array
          items: { $ref: "#/components/schemas/OutputContentBlock" }
        stop_reason:
          type: [string, "null"]
          enum: [end_turn, max_tokens, stop_sequence, tool_use, null]
        stop_sequence: { type: [string, "null"] }
        usage: { $ref: "#/components/schemas/Usage" }

    OutputContentBlock:
      oneOf:
        - { $ref: "#/components/schemas/TextBlock" }
        - { $ref: "#/components/schemas/ToolUseBlock" }
      discriminator: { propertyName: type }

    Usage:
      type: object
      required: [input_tokens, output_tokens]
      properties:
        input_tokens: { type: integer }
        output_tokens: { type: integer }

    # ── Models ────────────────────────────────────────────────────────────────────

    Model:
      type: object
      required: [id, type, display_name, created_at]
      properties:
        id: { type: string }
        type: { type: string, const: model }
        display_name: { type: string }
        created_at: { type: string, format: date-time }
        max_input_tokens: { type: integer }
        max_tokens: { type: integer }

    ModelList:
      type: object
      required: [data, has_more]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/Model" } }
        has_more: { type: boolean }
        first_id: { type: [string, "null"] }
        last_id: { type: [string, "null"] }

    # ── Account ───────────────────────────────────────────────────────────────────

    Account:
      type: object
      required: [id, user_id, plan]
      properties:
        id: { type: string, description: Platform account ID (`pa_…`). }
        user_id: { type: string }
        plan: { type: string }

    UsageSummary:
      type: object
      required: [period, requests, tokens, by_model]
      properties:
        period: { type: string }
        requests: { type: integer }
        tokens: { type: integer }
        by_model:
          type: object
          additionalProperties: { type: integer }

    UsageDashboard:
      type: object
      properties:
        plan: { type: string }
        periodStart: { type: integer, description: Unix epoch of the billing period start. }
        models:
          type: array
          items:
            type: object
            properties:
              model: { type: string }
              includedInputTokens: { type: integer }
              includedOutputTokens: { type: integer }
              extraInputTokens: { type: integer }
              extraOutputTokens: { type: integer }
              extraSpendCents: { type: integer }
              requestCount: { type: integer }
              multiplier: { type: number }
        billing: { type: object, additionalProperties: true }
        compute: { type: [object, "null"], additionalProperties: true }

    AgentList:
      type: object
      required: [agents]
      properties:
        agents:
          type: array
          items: { $ref: "#/components/schemas/Agent" }

    Agent:
      type: object
      required: [id]
      properties:
        id: { type: string }
        description: { type: string }
        status: { type: string }
        started_at: { type: [string, integer, "null"] }
        completed_at: { type: [string, integer, "null"] }
        duration_ms: { type: [integer, "null"] }
        turns: { type: [integer, "null"] }
        input_tokens: { type: [integer, "null"] }
        output_tokens: { type: [integer, "null"] }
        error: { type: [string, "null"] }

    BillingSummary:
      type: object
      properties:
        plan: { type: string }
        status: { type: string }
        limits: { type: object, additionalProperties: true }
        current_usage: { type: object, additionalProperties: true }

    # ── Sessions ──────────────────────────────────────────────────────────────────

    CreateSessionParams:
      type: object
      properties:
        model:
          type: string
          description: Preferred model for this session (e.g. "rye" or "zoysia").
        title:
          type: string
          maxLength: 255
          description: Human-readable session title.
        system:
          type: string
          description: >
            Per-session system prompt (persona + guardrails). Injected into
            every prompt turn and resume for this session (spec §2.2).
        metadata:
          type: object
          additionalProperties: { type: string }
          description: >
            Arbitrary key-value metadata attached to the session
            (e.g. {"team":"eng","role":"runner"}).
        connectors:
          type: array
          description: >
            Connectors to attach to this session (spec §1.4). Each entry
            references a registered connector and may supply a per-session
            team bearer override. Validation (live MCP probe) runs at create
            time; the session is rolled back on failure.
          items: { $ref: "#/components/schemas/SessionConnector" }

    SessionCreated:
      type: object
      required: [id, status, created_at]
      description: Response body for a successful `POST /v1/sessions` (201 Created).
      properties:
        id: { type: string, description: Session ID. }
        model: { type: [string, "null"], description: "Preferred model, if set." }
        status: { type: string, const: active }
        created_at: { type: string, description: ISO 8601 creation timestamp. }

    Session:
      type: object
      description: >
        Session summary object returned by GET /v1/sessions and GET /v1/sessions/{id}.
      properties:
        id: { type: string }
        model: { type: [string, "null"] }
        title: { type: string }
        status: { type: string }
        message_count: { type: integer }
        created_at: { type: string }
        updated_at: { type: string }
        system:
          type: [string, "null"]
          description: Per-session system prompt, if set.
        metadata:
          type: [object, "null"]
          additionalProperties: { type: string }
          description: Key-value metadata attached to the session, if set.

    SessionList:
      type: object
      required: [sessions]
      properties:
        sessions:
          type: array
          items: { $ref: "#/components/schemas/Session" }

    SessionUsage:
      type: object
      description: >
        Anthropic-style token usage for a session prompt turn
        (no total_tokens — compute client-side).
      required: [input_tokens, output_tokens]
      properties:
        input_tokens: { type: integer }
        output_tokens: { type: integer }

    SessionPromptResponse:
      type: object
      description: Buffered response for `POST /v1/sessions/{id}/messages` when `stream` is false.
      required: [message, usage]
      properties:
        message:
          type: object
          required: [role, content]
          properties:
            role: { type: string, const: assistant }
            content: { type: string, description: Accumulated assistant response text. }
        usage: { $ref: "#/components/schemas/SessionUsage" }

    SessionStreamEvent:
      description: |
        One SSE data frame emitted by `POST /v1/sessions/{id}/messages` when
        `stream:true`. The wire format is `data: <json>\n\n`. The stream is
        terminated by `data: [DONE]\n\n` immediately after a `done` or `error`
        event.
      oneOf:
        - $ref: "#/components/schemas/SessionStreamDelta"
        - $ref: "#/components/schemas/SessionStreamToolCall"
        - $ref: "#/components/schemas/SessionStreamToolResult"
        - $ref: "#/components/schemas/SessionStreamDone"
        - $ref: "#/components/schemas/SessionStreamError"
      discriminator: { propertyName: type }

    SessionStreamDelta:
      type: object
      required: [type, delta]
      description: Incremental text token from the model.
      properties:
        type: { type: string, const: delta }
        delta: { type: string, description: The incremental text content. }

    SessionStreamToolCall:
      type: object
      required: [type, id, name, input]
      description: The model invoked a tool.
      properties:
        type: { type: string, const: tool_call }
        id: { type: string, description: Tool call ID (echoed in the matching tool_result). }
        name: { type: string, description: Tool name. }
        input: { type: string, description: Tool input as a JSON string. }

    SessionStreamToolResult:
      type: object
      required: [type, id, output, is_error]
      description: A tool result was returned to the model.
      properties:
        type: { type: string, const: tool_result }
        id: { type: string, description: Tool call ID this result is for. }
        output: { type: string, description: Tool output (string or JSON). }
        is_error: { type: boolean, description: True if the tool returned an error. }

    SessionStreamDone:
      type: object
      required: [type, status]
      description: >
        The prompt turn is complete. `text` is the authoritative final assistant
        turn text (deltas are display-only; use this for storage).
      properties:
        type: { type: string, const: done }
        status:
          type: string
          description: Stop reason (e.g. "complete", "end_turn", "max_tokens").
        text:
          type: string
          description: >
            Authoritative final-turn text from `Done.final_text`. May be empty
            on older servers — clients should reconcile against their delta
            accumulation in that case.
        usage: { $ref: "#/components/schemas/SessionUsage" }

    SessionStreamError:
      type: object
      required: [type, message]
      description: The model or backend returned an error. The stream closes after this event.
      properties:
        type: { type: string, const: error }
        message: { type: string }

    SessionResumeResponse:
      type: object
      required: [messages, tool_calls]
      description: >
        Response for `POST /v1/sessions/{id}/resume`. Read-only history
        rehydration — NOT a prompt. Clients interleave `messages` and
        `tool_calls` by `created_at` to reconstruct the full turn sequence.
      properties:
        messages:
          type: array
          items: { $ref: "#/components/schemas/SessionMessage" }
        tool_calls:
          type: array
          items: { $ref: "#/components/schemas/SessionToolCall" }

    SessionMessage:
      type: object
      required: [role, content, created_at]
      properties:
        role: { type: string, enum: [user, assistant] }
        content: { type: string }
        images:
          type: [string, "null"]
          description: Base64-encoded images attached to this message (if any).
        created_at: { type: string, description: ISO 8601 creation timestamp. }

    SessionToolCall:
      type: object
      required: [id, name, input, output, status, created_at]
      properties:
        id: { type: string, description: Tool call ID. }
        name: { type: string }
        input: { type: string, description: Tool input as a JSON string. }
        output: { type: string, description: Tool output as a string. }
        status: { type: string }
        created_at: { type: string }

    SessionConnector:
      type: object
      description: >
        A connector attachment included when creating a session (spec §1.4).
        References a registered connector by `connector_id` and optionally
        overrides its credentials for this session only.
      required: [connector_id]
      properties:
        connector_id:
          type: string
          description: >
            The connector ID (from `POST /v1/connectors`). Also accepted as
            `connectorId` (camelCase).
        bearer:
          type: [string, "null"]
          description: >
            Per-session team bearer override. When set, replaces the
            connector's stored default bearer for this session only.
        headers:
          type: [object, "null"]
          additionalProperties: { type: string }
          description: Per-session static header overrides (key → value).

    # ── Connectors ────────────────────────────────────────────────────────────────

    ConnectorAuth:
      type: object
      description: >
        Authentication credentials for a connector. Only `"bearer"` kind is
        currently supported. The `value` field is **write-only** — it is
        always omitted from API responses (spec §1.3).
      required: [kind]
      properties:
        kind:
          type: string
          const: bearer
          description: Always "bearer".
        value:
          type: string
          description: >
            The bearer token value. Write-only: never returned in responses.
          writeOnly: true
        per_session:
          type: [boolean, "null"]
          description: >
            When true, the per-session team bearer is used at prompt time;
            the stored `value` (if any) is an optional fallback.

    ConnectorCreateParams:
      type: object
      required: [name, type, url, auth]
      properties:
        name:
          type: string
          description: Human-readable name for the connector.
        type:
          type: string
          const: mcp
          description: Connector type — always "mcp".
        url:
          type: string
          description: The MCP endpoint URL (the JSON-RPC POST target).
        auth: { $ref: "#/components/schemas/ConnectorAuth" }
        headers:
          type: object
          additionalProperties: { type: string }
          description: >
            Static extra headers sent on every MCP request. Values are
            stored server-side and redacted (replaced with `"***"`) on read.
        tool_allowlist:
          type: array
          items: { type: string }
          description: When set, only these tools are exposed to the model.
        tool_denylist:
          type: array
          items: { type: string }
          description: Listed tools are hidden from the model.

    ConnectorUpdateParams:
      type: object
      description: Fields for `PATCH /v1/connectors/{id}` — all optional.
      properties:
        name: { type: string }
        url: { type: string }
        auth: { $ref: "#/components/schemas/ConnectorAuth" }
        headers:
          type: object
          additionalProperties: { type: string }
        tool_allowlist:
          type: array
          items: { type: string }
        tool_denylist:
          type: array
          items: { type: string }

    Connector:
      type: object
      description: >
        A registered connector (remote-MCP server). Bearer tokens and static
        header values are always redacted in responses (spec §1.3):
        `auth.value` is never returned; `headers` values are replaced with
        `"***"`.
      required: [id, user_id, name, type, url, auth, created_at, updated_at]
      properties:
        id: { type: string }
        user_id: { type: string }
        name: { type: string }
        type: { type: string, const: mcp }
        url: { type: string }
        auth:
          type: object
          description: >
            Auth metadata. `value` is never present in responses. `kind` is
            always "bearer". `per_session` is included if set.
          required: [kind]
          properties:
            kind: { type: string, const: bearer }
            per_session: { type: [boolean, "null"] }
        headers:
          type: [object, "null"]
          description: >
            Static header keys present on the connector. Values are always
            redacted to `"***"` in responses.
          additionalProperties: { type: string }
        tool_allowlist:
          type: [array, "null"]
          items: { type: string }
        tool_denylist:
          type: [array, "null"]
          items: { type: string }
        created_at: { type: string }
        updated_at: { type: string }

    ConnectorList:
      type: object
      required: [connectors]
      properties:
        connectors:
          type: array
          items: { $ref: "#/components/schemas/Connector" }

    ConnectorTestResult:
      type: object
      required: [ok]
      description: >
        Result of `POST /v1/connectors/{id}/test`. A failed probe is reported
        as `ok: false` — the HTTP response is still 200. `tool_count` is
        absent when `ok` is false.
      properties:
        ok:
          type: boolean
          description: Whether the live tools/list call succeeded.
        tool_count:
          type: integer
          description: Number of tools returned by the MCP server (absent when ok is false).
        error:
          type: [string, "null"]
          description: >
            Human-readable error when ok is false (e.g. "401 Unauthorized" for
            auth failures, or a transport error description).

    # ── Memories ──────────────────────────────────────────────────────────────────

    Memory:
      type: object
      required: [id, text, created_at]
      description: A single adaptive memory entry.
      properties:
        id: { type: string }
        text: { type: string }
        metadata:
          type: object
          additionalProperties: { type: string }
          description: Key-value metadata attached at add time.
        created_at: { type: string }
        score:
          type: [number, "null"]
          description: Semantic relevance score (only present in search results).

    MemoryList:
      type: object
      required: [memories]
      properties:
        memories:
          type: array
          items: { $ref: "#/components/schemas/Memory" }

    MemoryStats:
      type: object
      required: [count]
      properties:
        count: { type: integer, description: Total stored memories for the caller. }
        last_added_at:
          type: [string, "null"]
          description: ISO 8601 timestamp of the most recent memory, or null if empty.

    # ── Plugins ───────────────────────────────────────────────────────────────────

    BuiltinTool:
      type: object
      description: A built-in tool definition available to the model.
      properties:
        name: { type: string }
        description: { type: string }
        category: { type: string }
        parameters:
          type: [object, "null"]
          additionalProperties: true
          description: JSON Schema for the tool's parameters.

    Plugin:
      type: object
      description: A user-owned plugin with install status.
      properties:
        name: { type: string }
        kind: { type: string }
        status: { type: string }
        configurable: { type: boolean }
        config_keys: { type: array, items: { type: string } }
        error: { type: [string, "null"] }

    PluginSurface:
      type: object
      required: [tools, plugins]
      description: Response for `GET /v1/plugins`.
      properties:
        tools:
          type: array
          items: { $ref: "#/components/schemas/BuiltinTool" }
        plugins:
          type: array
          items: { $ref: "#/components/schemas/Plugin" }

    RegistryEntry:
      type: object
      description: A plugin available in the marketplace registry.
      properties:
        id: { type: string }
        name: { type: string }
        kind: { type: string }
        description: { type: string }
        version: { type: string }
        author: { type: string }
        required_secrets: { type: array, items: { type: string } }

    RegistryCatalog:
      type: object
      required: [plugins]
      properties:
        plugins:
          type: array
          items: { $ref: "#/components/schemas/RegistryEntry" }

    RegistryDetail:
      type: object
      required: [plugin_id]
      properties:
        plugin_id: { type: string }
        manifest:
          description: Plugin manifest (decoded from JSON string by the gateway).
          type: [object, "null"]
          additionalProperties: true
        readme: { type: [string, "null"] }

    InstalledPlugin:
      type: object
      properties:
        plugin_name: { type: string }
        enabled: { type: boolean }
        permissions: { type: array, items: { type: string } }
        updated_at: { type: string }

    InstalledPluginList:
      type: object
      required: [installed]
      properties:
        installed:
          type: array
          items: { $ref: "#/components/schemas/InstalledPlugin" }

    # ── Project management ────────────────────────────────────────────────────────

    TaskCard:
      type: object
      required: [taskId]
      description: A kanban task card.
      properties:
        taskId: { type: string }
        projectId: { type: [string, "null"] }
        parentTaskId: { type: [string, "null"] }
        title: { type: string }
        description: { type: [string, "null"] }
        status: { type: string, description: "Column status (e.g. todo / in_progress / done)." }
        priority: { type: [string, "null"] }
        labels:
          type: array
          items: { type: string }
          description: Label strings (decoded from JSON string by the gateway).
        checklist:
          type: array
          items: { type: object, additionalProperties: true }
          description: Checklist items (decoded from JSON string by the gateway).
        sortOrder: { type: [number, "null"] }
        createdAt: { type: string }
        updatedAt: { type: string }

    DependencyEdge:
      type: object
      required: [taskId, blocksTaskId]
      properties:
        taskId: { type: string }
        blocksTaskId: { type: string }

    Project:
      type: object
      required: [projectId, name]
      properties:
        projectId: { type: string }
        name: { type: string }
        description: { type: [string, "null"] }
        archived: { type: boolean }
        createdAt: { type: string }
        updatedAt: { type: string }

    BoardResponse:
      type: object
      required: [tasks, projects, deps]
      properties:
        tasks: { type: array, items: { $ref: "#/components/schemas/TaskCard" } }
        projects: { type: array, items: { $ref: "#/components/schemas/Project" } }
        deps:
          type: array
          items: { $ref: "#/components/schemas/DependencyEdge" }
          description: Dependency edges (task → blocks-task relationships).

    TaskDetail:
      type: object
      required: [subtasks, blocks, blockedBy]
      properties:
        task: { $ref: "#/components/schemas/TaskCard" }
        subtasks:
          type: array
          items: { $ref: "#/components/schemas/TaskCard" }
        blocks:
          type: array
          items: { type: string }
          description: Task IDs that this task blocks.
        blockedBy:
          type: array
          items: { type: string }
          description: Task IDs that block this task.

    CreateTaskParams:
      type: object
      required: [title]
      properties:
        title: { type: string, maxLength: 2048 }
        description: { type: string }
        projectId: { type: string }
        parentTaskId: { type: string }
        status: { type: string }
        priority: { type: string }
        labels:
          type: array
          items: { type: string }
        labels_json: { type: string, description: Pre-serialised labels JSON (alternative to labels). }

    UpdateTaskParams:
      type: object
      properties:
        title: { type: string }
        description: { type: string }
        status: { type: string }
        priority: { type: string }
        labels:
          type: array
          items: { type: string }
        labels_json: { type: string }
        projectId: { type: string }

    Schedule:
      type: object
      required: [taskId, name, cronExpr, actionKind, enabled]
      description: A cron-scheduled task.
      properties:
        taskId: { type: string }
        name: { type: string }
        cronExpr: { type: string }
        actionKind: { type: string }
        actionPayload:
          type: [object, "null"]
          additionalProperties: true
          description: Action payload (decoded from JSON string by the gateway).
        enabled: { type: boolean }
        createdAt: { type: string }
        updatedAt: { type: string }
        lastRunAt: { type: [string, "null"] }
        nextRunAt: { type: [string, "null"] }

    WorkflowSummary:
      type: object
      required: [workflowId, name]
      properties:
        workflowId: { type: string }
        name: { type: string }
        compileStatus: { type: string }
        enabled: { type: boolean }
        createdAt: { type: string }
        updatedAt: { type: string }

    WorkflowDetail:
      type: object
      required: [workflowId, name]
      properties:
        workflowId: { type: string }
        name: { type: string }
        source: { type: string, description: Workflow source code / definition. }
        compileStatus: { type: string }
        enabled: { type: boolean }
        createdAt: { type: string }
        updatedAt: { type: string }

    WorkflowRunEvent:
      type: object
      properties:
        seq: { type: integer }
        ts: { type: string }
        level: { type: string }
        message: { type: string }

    WorkflowRun:
      type: object
      required: [runId, status, events]
      properties:
        runId: { type: string }
        status: { type: string }
        startedAt: { type: [string, "null"] }
        completedAt: { type: [string, "null"] }
        output:
          type: [object, "null"]
          additionalProperties: true
          description: Workflow output payload (decoded from JSON string by the gateway).
        error: { type: [string, "null"] }
        events:
          type: array
          items: { $ref: "#/components/schemas/WorkflowRunEvent" }

    # ── Errors ────────────────────────────────────────────────────────────────────

    AnthropicError:
      type: object
      required: [type, error]
      properties:
        type: { type: string, const: error }
        request_id: { type: string }
        error:
          type: object
          required: [type, message]
          properties:
            type:
              type: string
              enum:
                - invalid_request_error
                - authentication_error
                - permission_error
                - not_found_error
                - request_too_large
                - rate_limit_error
                - api_error
                - overloaded_error
            message: { type: string }

    LegacyError:
      type: object
      required: [error]
      description: >
        Platform-surface error envelope. SDKs should parse both this and
        `AnthropicError` (prefer `error.type`, fall back to `error.code`).
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
