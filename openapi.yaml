openapi: 3.1.0
info:
  title: Simse API
  description: |-
    The Simse public REST API at `api.simse.dev`. The flagship endpoint `POST /v1/messages` is **wire-compatible with the Anthropic Messages API** — the official Anthropic client patterns work against it. Models: `rye` (Qwen3.5-4B) and `zoysia` (Qwen3.5-9B, default).

    Generated code-first from the `simse-warp` handler annotations (the single source of truth). Authoritative prose contract: `sdk/CONTRACT.md`.
  license:
    name: MIT
  version: 2026-06-01
servers:
- url: https://api.simse.dev
paths:
  /v1/account:
    get:
      tags:
      - Account
      summary: Get the authenticated account.
      operationId: getAccount
      responses:
        '200':
          description: Account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '401':
          description: Missing/invalid credential.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
  /v1/agents:
    get:
      tags:
      - Account
      summary: Subagent run history (newest first).
      operationId: listAgents
      responses:
        '200':
          description: Subagent run history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentList'
        '401':
          description: Missing/invalid API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
  /v1/artifacts:
    get:
      tags:
      - Library
      summary: List artifacts (filter/sort/page + content_type via query params).
      operationId: listArtifacts
      parameters:
      - name: content_type
        in: query
        description: Filter by content type.
        required: false
        schema:
          type: string
      - name: tags
        in: query
        description: Comma-separated tag filter.
        required: false
        schema:
          type: string
      - name: collection_id
        in: query
        description: Restrict to a collection.
        required: false
        schema:
          type: string
      - name: starred
        in: query
        description: Filter by starred flag.
        required: false
        schema:
          type: boolean
      - name: include_archived
        in: query
        description: Include archived artifacts.
        required: false
        schema:
          type: boolean
      - name: sort
        in: query
        description: Sort field.
        required: false
        schema:
          type: string
      - name: order
        in: query
        description: '`asc` or `desc` (default).'
        required: false
        schema:
          type: string
      - name: limit
        in: query
        description: Page size.
        required: false
        schema:
          type: integer
          format: int64
      - name: cursor
        in: query
        description: Keyset page cursor.
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Artifacts `{artifacts, nextCursor}`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeformObject'
        '401':
          description: Missing/invalid credential.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
    post:
      tags:
      - Library
      summary: Upload a raw-body artifact (name + content_type as query params).
      operationId: putArtifact
      parameters:
      - name: name
        in: query
        description: Artifact filename (required).
        required: true
        schema:
          type: string
      - name: content_type
        in: query
        description: Artifact MIME type (required).
        required: true
        schema:
          type: string
      - name: description
        in: query
        description: Optional description.
        required: false
        schema:
          type: string
      - name: collection_id
        in: query
        description: Optional collection.
        required: false
        schema:
          type: string
      - name: tags
        in: query
        description: Comma-separated tags.
        required: false
        schema:
          type: string
      requestBody:
        description: Raw artifact bytes.
        content:
          application/octet-stream:
            schema:
              type: string
        required: true
      responses:
        '201':
          description: Created `{id, sizeBytes}`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeformObject'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
        '401':
          description: Missing/invalid credential.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
  /v1/artifacts/{id}:
    get:
      tags:
      - Library
      summary: Download the raw artifact bytes (verbatim).
      operationId: getArtifact
      parameters:
      - name: id
        in: path
        description: Artifact id.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Raw artifact bytes (Content-Disposition attachment).
          content:
            application/octet-stream:
              schema:
                type: string
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
        '401':
          description: Missing/invalid credential.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
    delete:
      tags:
      - Library
      summary: Delete an artifact.
      operationId: deleteArtifact
      parameters:
      - name: id
        in: path
        description: Artifact id.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Deleted `{deleted}`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeformObject'
        '401':
          description: Missing/invalid credential.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
  /v1/artifacts/{id}/flags:
    post:
      tags:
      - Library
      summary: Set an artifact's star/archive flags.
      operationId: setArtifactFlags
      parameters:
      - name: id
        in: path
        description: Artifact id.
        required: true
        schema:
          type: string
      requestBody:
        description: '`{starred?, archived?}`'
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FreeformObject'
        required: true
      responses:
        '200':
          description: Updated `{ok}`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeformObject'
        '401':
          description: Missing/invalid credential.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
  /v1/billing:
    get:
      tags:
      - Account
      summary: Get plan + limits.
      operationId: getBilling
      responses:
        '200':
          description: Billing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Billing'
        '401':
          description: Missing/invalid credential.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
  /v1/flags:
    get:
      tags:
      - Flags
      summary: Feature flags enabled for the caller.
      description: |-
        Evaluates every `v1.*` flag for the authenticated caller and returns
        `{"flags": {"<flag>": bool, ...}}` so clients/console/app can hide the
        features the account isn't entitled to. Authed like the rest of `/v1`
        (individual-user authenticator); fails open (a flags outage reports
        all-enabled, matching the gate's runtime behaviour). Ungated by design.
      operationId: getFlags
      responses:
        '200':
          description: Flags `{flags:{flag:bool}}`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlagsResponse'
        '401':
          description: Missing/invalid credential.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
  /v1/library:
    get:
      tags:
      - Library
      summary: List library documents (filter/sort/page via query params).
      operationId: listDocuments
      parameters:
      - name: kind
        in: query
        description: Filter by document kind.
        required: false
        schema:
          type: string
      - name: collection_id
        in: query
        description: Filter by collection.
        required: false
        schema:
          type: string
      - name: recursive
        in: query
        description: Recurse into sub-collections.
        required: false
        schema:
          type: boolean
      - name: tags
        in: query
        description: Comma-separated tag filter.
        required: false
        schema:
          type: string
      - name: tag_match
        in: query
        description: '`any` (default) or `all`.'
        required: false
        schema:
          type: string
      - name: author
        in: query
        description: Filter by author.
        required: false
        schema:
          type: string
      - name: starred
        in: query
        description: Filter by starred flag.
        required: false
        schema:
          type: boolean
      - name: include_archived
        in: query
        description: Include archived docs.
        required: false
        schema:
          type: boolean
      - name: text
        in: query
        description: Substring text filter.
        required: false
        schema:
          type: string
      - name: sort
        in: query
        description: Sort field.
        required: false
        schema:
          type: string
      - name: order
        in: query
        description: '`asc` or `desc` (default).'
        required: false
        schema:
          type: string
      - name: limit
        in: query
        description: Page size.
        required: false
        schema:
          type: integer
          format: int64
      - name: cursor
        in: query
        description: Keyset page cursor.
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Documents `{docs, nextCursor}`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeformObject'
        '401':
          description: Missing/invalid credential.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
    post:
      tags:
      - Library
      summary: Create a library document.
      operationId: createDocument
      requestBody:
        description: '`{kind, title, body?, summary?, collectionId?, tags?, sourceUrl?}`'
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FreeformObject'
        required: true
      responses:
        '201':
          description: Created `{id, version}`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeformObject'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
        '401':
          description: Missing/invalid credential.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
  /v1/library/collections:
    get:
      tags:
      - Library
      summary: List the collection tree.
      operationId: listCollections
      responses:
        '200':
          description: Collections.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeformObject'
        '401':
          description: Missing/invalid credential.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
    post:
      tags:
      - Library
      summary: Create a collection.
      operationId: createCollection
      requestBody:
        description: '`{name, parentId?}`'
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FreeformObject'
        required: true
      responses:
        '201':
          description: Created `{id}`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeformObject'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
        '401':
          description: Missing/invalid credential.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
  /v1/library/collections/{id}:
    delete:
      tags:
      - Library
      summary: Delete a collection.
      operationId: deleteCollection
      parameters:
      - name: id
        in: path
        description: Collection id.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Deleted `{deleted}`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeformObject'
        '401':
          description: Missing/invalid credential.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
    patch:
      tags:
      - Library
      summary: Rename a collection.
      operationId: updateCollection
      parameters:
      - name: id
        in: path
        description: Collection id.
        required: true
        schema:
          type: string
      requestBody:
        description: '`{name}`'
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FreeformObject'
        required: true
      responses:
        '200':
          description: Updated `{ok}`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeformObject'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
        '401':
          description: Missing/invalid credential.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
  /v1/library/collections/{id}/reorder:
    post:
      tags:
      - Library
      summary: Set a collection's sort position.
      operationId: reorderCollection
      parameters:
      - name: id
        in: path
        description: Collection id.
        required: true
        schema:
          type: string
      requestBody:
        description: '`{position}`'
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FreeformObject'
        required: true
      responses:
        '200':
          description: Reordered `{ok}`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeformObject'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
        '401':
          description: Missing/invalid credential.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
  /v1/library/facets:
    get:
      tags:
      - Library
      summary: Browse facet counts (kinds/tags/collections + starred/archived/total).
      operationId: facets
      parameters:
      - name: tags
        in: query
        description: Comma-separated tag filter.
        required: false
        schema:
          type: string
      - name: collection_id
        in: query
        description: Restrict to a collection.
        required: false
        schema:
          type: string
      - name: include_archived
        in: query
        description: Include archived docs.
        required: false
        schema:
          type: boolean
      responses:
        '200':
          description: Facet counts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeformObject'
        '401':
          description: Missing/invalid credential.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
  /v1/library/search:
    get:
      tags:
      - Library
      summary: Hybrid search over the library.
      operationId: searchDocuments
      parameters:
      - name: q
        in: query
        description: The search query (required).
        required: true
        schema:
          type: string
      - name: mode
        in: query
        description: Retrieval mode (`hybrid` default).
        required: false
        schema:
          type: string
      - name: tags
        in: query
        description: Comma-separated tag filter.
        required: false
        schema:
          type: string
      - name: collection_id
        in: query
        description: Restrict to a collection.
        required: false
        schema:
          type: string
      - name: limit
        in: query
        description: Page size.
        required: false
        schema:
          type: integer
          format: int64
      - name: cursor
        in: query
        description: Keyset page cursor.
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Search hits `{hits, nextCursor}`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeformObject'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
        '401':
          description: Missing/invalid credential.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
  /v1/library/{id}:
    get:
      tags:
      - Library
      summary: Get one document (meta + body).
      operationId: getDocument
      parameters:
      - name: id
        in: path
        description: Document id.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Document `{meta, body}`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeformObject'
        '401':
          description: Missing/invalid credential.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
    delete:
      tags:
      - Library
      summary: Delete a document.
      operationId: deleteDocument
      parameters:
      - name: id
        in: path
        description: Document id.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Deleted `{deleted}`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeformObject'
        '401':
          description: Missing/invalid credential.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
    patch:
      tags:
      - Library
      summary: Partially update a document.
      operationId: updateDocument
      parameters:
      - name: id
        in: path
        description: Document id.
        required: true
        schema:
          type: string
      requestBody:
        description: '`{body?, title?, summary?, collectionId?, tags?, clearCollection?}`'
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FreeformObject'
        required: true
      responses:
        '200':
          description: Updated `{version}`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeformObject'
        '401':
          description: Missing/invalid credential.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
  /v1/library/{id}/backlinks:
    get:
      tags:
      - Library
      summary: List the documents that cite this document.
      operationId: listBacklinks
      parameters:
      - name: id
        in: path
        description: Document id.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Backlinks.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeformObject'
        '401':
          description: Missing/invalid credential.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
  /v1/library/{id}/citations:
    get:
      tags:
      - Library
      summary: List a document's outbound citations.
      operationId: listCitations
      parameters:
      - name: id
        in: path
        description: Document id.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Citations.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeformObject'
        '401':
          description: Missing/invalid credential.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
    post:
      tags:
      - Library
      summary: Add a citation (to a document or external source).
      operationId: addCitation
      parameters:
      - name: id
        in: path
        description: Document id.
        required: true
        schema:
          type: string
      requestBody:
        description: '`{targetKind, targetDocId?, extTitle?, extUrl?, extDoi?, locator?, note?}`'
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FreeformObject'
        required: true
      responses:
        '201':
          description: Created `{id}`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeformObject'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
        '401':
          description: Missing/invalid credential.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
  /v1/library/{id}/citations/{citation_id}:
    delete:
      tags:
      - Library
      summary: Remove a citation (citation id is a path param).
      operationId: removeCitation
      parameters:
      - name: id
        in: path
        description: Document id.
        required: true
        schema:
          type: string
      - name: citation_id
        in: path
        description: Citation id.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Removed `{removed}`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeformObject'
        '401':
          description: Missing/invalid credential.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
  /v1/library/{id}/flags:
    post:
      tags:
      - Library
      summary: Set a document's star/archive flags.
      operationId: setDocumentFlags
      parameters:
      - name: id
        in: path
        description: Document id.
        required: true
        schema:
          type: string
      requestBody:
        description: '`{starred?, archived?}`'
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FreeformObject'
        required: true
      responses:
        '200':
          description: Updated `{ok}`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeformObject'
        '401':
          description: Missing/invalid credential.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
  /v1/library/{id}/move:
    post:
      tags:
      - Library
      summary: Move a document into (or out of) a collection.
      operationId: moveDocument
      parameters:
      - name: id
        in: path
        description: Document id.
        required: true
        schema:
          type: string
      requestBody:
        description: '`{collectionId?}`'
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FreeformObject'
        required: true
      responses:
        '200':
          description: Moved `{ok}`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeformObject'
        '401':
          description: Missing/invalid credential.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
  /v1/library/{id}/versions:
    get:
      tags:
      - Library
      summary: List a document's version history.
      operationId: listVersions
      parameters:
      - name: id
        in: path
        description: Document id.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Versions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeformObject'
        '401':
          description: Missing/invalid credential.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
  /v1/library/{id}/versions/{version}:
    get:
      tags:
      - Library
      summary: Get a single historical version body.
      operationId: getVersion
      parameters:
      - name: id
        in: path
        description: Document id.
        required: true
        schema:
          type: string
      - name: version
        in: path
        description: Version number.
        required: true
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: Version `{body, meta}`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeformObject'
        '401':
          description: Missing/invalid credential.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
        '404':
          description: Not found.
          content:
